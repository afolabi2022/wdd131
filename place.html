<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131 - Dynamic Web Fundamentals | Liberia page by Emmanuel Afolabi">
    <meta name="author" content="Emmanuel Afolabi">

    <title>Place - Liberia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Liberia</h1>
    </header>

    <main>

        <picture class="hero">
            <source media="(min-width:768px)" srcset="images/liberia-large.webp">
            <img src="images/liberia-small.webp" alt="Beautiful view of Liberia">
        </picture>

        <section class="data">
            <h2>Data</h2>

            <p><strong>Capital:</strong> Monrovia</p>
            <p><strong>Population:</strong> 5.4 Million</p>
            <p><strong>Area:</strong> 111,369 km²</p>
            <p><strong>Language:</strong> English</p>
            <p><strong>Currency:</strong> Liberian Dollar (LRD)</p>
            <p><strong>Time Zone:</strong> GMT</p>
        </section>

        <section class="weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temp">8</span> °C</p>
            <p><strong>Conditions:</strong> Cloudy</p>
            <p><strong>Wind:</strong> <span id="wind">12</span> km/h</p>
            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
        </section>

    </main>

    <footer>

        <p>
            &copy;
            <span id="currentyear"></span>
            Emmanuel O. Afolabi | Liberia
        </p>

        <p id="lastModified"></p>

    </footer>

</body>

</html>
